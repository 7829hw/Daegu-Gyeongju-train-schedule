        const initialSrtCsv = `방향,열차번호,종류,서대구,동대구,경주,운행일

상행,370,SRT,,21:23,21:05,매일
상행,378,SRT,23:24,23:14,22:56,매일`;

        // 2. 시간 및 날짜 유틸리티 함수
        const timeToMinutes = (timeStr) => {
            if (!timeStr || timeStr.trim() === '') return -1;
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        };

        const checkDays = (daysStr, dateStr) => {
            if (!daysStr) return true;
            const d = new Date(dateStr);
            const dayIdx = d.getDay(); // 0:일, 1:월, ..., 6:토
            const dayName = ['일', '월', '화', '수', '목', '금', '토'][dayIdx];
            
            if (daysStr.includes('매일')) return true;
            if (daysStr.includes('월~목') && dayIdx >= 1 && dayIdx <= 4) return true;
            if (daysStr.includes('월~금') && dayIdx >= 1 && dayIdx <= 5) return true;
            if (daysStr.includes('금토일') && [5, 6, 0].includes(dayIdx)) return true;
            if (daysStr.includes('토일') && [6, 0].includes(dayIdx)) return true;
            if (daysStr.includes(dayName)) return true; // 특정 요일 직접 명시된 경우
            
            return false;
        };

        const parseCSV = (csvStr, defaultType) => {
            const lines = csvStr.trim().split('\n');
            const schedules = [];
            // 두 번째 줄(인덱스 1)부터 데이터 파싱
            for (let i = 1; i < lines.length; i++) {
                if (!lines[i].trim()) continue;
                const cols = lines[i].split(',');
                
                let type = cols[2]?.trim();
                // 종류가 비어있으면 파일 종류로 채움 (예: SRT 파일에 종류가 비어있는 경우)
                if (!type) type = defaultType;

                schedules.push({
                    dir: cols[0]?.trim(),
                    trainNo: cols[1]?.trim(),
                    type: type,
                    seodaegu: cols[3]?.trim(),
                    dongdaegu: cols[4]?.trim(),
                    gyeongju: cols[5]?.trim(),
                    days: cols[6]?.trim()
                });
            }
            return schedules;
        };

        // 3. 메인 React 컴포넌트
        function App() {
            const [dateStr, setDateStr] = React.useState(() => {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            });
            const [route, setRoute] = React.useState('daegu-gyeongju'); // 'daegu-gyeongju' 또는 'gyeongju-daegu'
            const [allData, setAllData] = React.useState([]);

            // 초기 데이터 로드
            React.useEffect(() => {
                const ktx = parseCSV(initialKtxCsv, 'KTX');
                const srt = parseCSV(initialSrtCsv, 'SRT');
                setAllData([...ktx, ...srt]);
            }, []);

            // 선택된 조건에 맞춰 데이터 필터링 및 정렬
            const getFilteredSchedules = () => {
                return allData.filter(s => {
                    if (!checkDays(s.days, dateStr)) return false;

                    const seoTime = timeToMinutes(s.seodaegu);
                    const dongTime = timeToMinutes(s.dongdaegu);
                    const gyTime = timeToMinutes(s.gyeongju);

                    const hasDaegu = seoTime >= 0 || dongTime >= 0;
                    const hasGyeongju = gyTime >= 0;

                    if (!hasDaegu || !hasGyeongju) return false;

                    const daeguMinTime = Math.min(...[seoTime, dongTime].filter(t => t >= 0));
                    const daeguMaxTime = Math.max(...[seoTime, dongTime].filter(t => t >= 0));

                    if (route === 'daegu-gyeongju') {
                        // 대구 출발 -> 경주 도착 (대구 시간이 경주 시간보다 빨라야 함)
                        return daeguMinTime < gyTime;
                    } else {
                        // 경주 출발 -> 대구 도착 (경주 시간이 대구 시간보다 빨라야 함)
                        return gyTime < daeguMaxTime;
                    }
                }).map(s => {
                    const seoTime = timeToMinutes(s.seodaegu);
                    const dongTime = timeToMinutes(s.dongdaegu);
                    const gyTime = timeToMinutes(s.gyeongju);

                    let depStations = [];
                    let arrStations = [];
                    let sortTime = 0;

                    if (route === 'daegu-gyeongju') {
                        if (seoTime >= 0) depStations.push({ name: '서대구', time: s.seodaegu, t: seoTime });
                        if (dongTime >= 0) depStations.push({ name: '동대구', time: s.dongdaegu, t: dongTime });
                        depStations.sort((a, b) => a.t - b.t); // 시간순 정렬 (서대구, 동대구 묶음 표시를 위함)
                        
                        arrStations.push({ name: '경주', time: s.gyeongju, t: gyTime });
                        sortTime = depStations[0].t;
                    } else {
                        depStations.push({ name: '경주', time: s.gyeongju, t: gyTime });
                        
                        if (seoTime >= 0) arrStations.push({ name: '서대구', time: s.seodaegu, t: seoTime });
                        if (dongTime >= 0) arrStations.push({ name: '동대구', time: s.dongdaegu, t: dongTime });
                        arrStations.sort((a, b) => a.t - b.t); // 도착역들도 시간순 정렬
                        
                        sortTime = gyTime;
                    }

                    return { ...s, depStations, arrStations, sortTime };
                }).sort((a, b) => a.sortTime - b.sortTime); // 최종 출발시간 기준 전체 정렬
            };

            const displaySchedules = getFilteredSchedules();

            return (
                <div className="max-w-4xl mx-auto p-4 md:p-6 pb-20">
                    {/* Header */}
                    <div className="bg-white rounded-2xl shadow-sm p-6 mb-6 text-center border border-slate-200">
                        <h1 className="text-3xl font-bold text-slate-800 mb-2">🚄 대구-경주 열차 시간표</h1>
                        <p className="text-slate-500">KTX 및 SRT 운행 일정을 확인해보세요.</p>
                    </div>

                    {/* Controls */}
                    <div className="bg-white rounded-2xl shadow-sm p-6 mb-6 border border-slate-200">
                        <div className="flex flex-col md:flex-row md:items-center justify-between gap-6">
                            
                            {/* Date Picker */}
                            <div className="flex flex-col w-full md:w-1/3">
                                <label className="text-sm font-semibold text-slate-600 mb-2">날짜 선택</label>
                                <input 
                                    type="date" 
                                    value={dateStr}
                                    onChange={(e) => setDateStr(e.target.value)}
                                    className="p-3 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition-all"
                                />
                            </div>

                            {/* Route Selector */}
                            <div className="flex flex-col w-full md:w-2/3">
                                <label className="text-sm font-semibold text-slate-600 mb-2">노선 선택</label>
                                <div className="flex rounded-lg overflow-hidden border border-slate-300">
                                    <button 
                                        onClick={() => setRoute('daegu-gyeongju')}
                                        className={`flex-1 py-3 text-center font-bold transition-all ${route === 'daegu-gyeongju' ? 'bg-blue-600 text-white' : 'bg-slate-50 text-slate-600 hover:bg-slate-100'}`}
                                    >
                                        대구 ➡️ 경주
                                    </button>
                                    <button 
                                        onClick={() => setRoute('gyeongju-daegu')}
                                        className={`flex-1 py-3 text-center font-bold transition-all ${route === 'gyeongju-daegu' ? 'bg-blue-600 text-white' : 'bg-slate-50 text-slate-600 hover:bg-slate-100'}`}
                                    >
                                        경주 ➡️ 대구
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Schedule Table */}
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                        {/* 데스크톱 및 태블릿용 테이블 화면 (모바일에서는 숨김) */}
                        <div className="hidden md:block overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-slate-50 border-b border-slate-200">
                                        <th className="py-4 px-6 font-semibold text-slate-600">열차 정보</th>
                                        <th className="py-4 px-6 font-semibold text-slate-600">출발역 및 시간</th>
                                        <th className="py-4 px-6 font-semibold text-slate-600">도착역 및 시간</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {displaySchedules.length > 0 ? (
                                        displaySchedules.map((item, idx) => (
                                            <tr key={idx} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                                <td className="py-4 px-6">
                                                    <div className="flex flex-col">
                                                        <span className={`text-xs font-bold px-2 py-1 rounded w-max mb-1 
                                                            ${item.type?.includes('KTX') ? 'bg-blue-100 text-blue-800' : 'bg-rose-100 text-rose-800'}`}>
                                                            {item.type}
                                                        </span>
                                                        <span className="font-semibold text-slate-700">{item.trainNo}호</span>
                                                    </div>
                                                </td>
                                                <td className="py-4 px-6">
                                                    <div className="flex flex-col gap-1.5">
                                                        {item.depStations.map((st, i) => (
                                                            <div key={i} className="flex items-center w-32 justify-between">
                                                                <span className="font-bold text-slate-800">{st.name}</span>
                                                                <span className="text-slate-600 font-medium">{st.time}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </td>
                                                <td className="py-4 px-6">
                                                    <div className="flex flex-col gap-1.5">
                                                        {item.arrStations.map((st, i) => (
                                                            <div key={i} className="flex items-center w-32 justify-between">
                                                                <span className="font-bold text-slate-800">{st.name}</span>
                                                                <span className="text-slate-600 font-medium">{st.time}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </td>
                                            </tr>
                                        ))
                                    ) : (
                                        <tr>
                                            <td colSpan="3" className="py-12 text-center text-slate-500">
                                                해당 날짜에 운행하는 열차 일정이 없습니다.
                                            </td>
                                        </tr>
                                    )}
                                </tbody>
                            </table>
                        </div>

                        {/* 모바일용 카드 화면 (데스크톱에서는 숨김) */}
                        <div className="block md:hidden">
                            {displaySchedules.length > 0 ? (
                                displaySchedules.map((item, idx) => (
                                    <div key={idx} className="p-4 border-b border-slate-100 hover:bg-slate-50 transition-colors">
                                        {/* 열차 정보 */}
                                        <div className="flex items-center gap-2 mb-3">
                                            <span className={`text-xs font-bold px-2 py-1 rounded 
                                                ${item.type?.includes('KTX') ? 'bg-blue-100 text-blue-800' : 'bg-rose-100 text-rose-800'}`}>
                                                {item.type}
                                            </span>
                                            <span className="font-semibold text-slate-700">{item.trainNo}호</span>
                                        </div>
                                        
                                        {/* 출발 -> 도착 정보 */}
                                        <div className="flex items-center bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
                                            {/* 출발 정보 */}
                                            <div className="flex-1 flex flex-col gap-3">
                                                {item.depStations.map((st, i) => (
                                                    <div key={i} className="flex flex-col">
                                                        <span className="text-xs font-medium text-slate-500 mb-0.5">{st.name}</span>
                                                        <span className="text-xl font-extrabold text-slate-800 tracking-tight">{st.time}</span>
                                                    </div>
                                                ))}
                                            </div>
                                            
                                            {/* 화살표 아이콘 */}
                                            <div className="px-4 text-slate-300 flex items-center justify-center">
                                                <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M14 5l7 7m0 0l-7 7m7-7H3" />
                                                </svg>
                                            </div>
                                            
                                            {/* 도착 정보 */}
                                            <div className="flex-1 flex flex-col gap-3 items-end text-right">
                                                {item.arrStations.map((st, i) => (
                                                    <div key={i} className="flex flex-col items-end">
                                                        <span className="text-xs font-medium text-slate-500 mb-0.5">{st.name}</span>
                                                        <span className="text-xl font-extrabold text-slate-800 tracking-tight">{st.time}</span>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                ))
                            ) : (
                                <div className="py-12 text-center text-slate-500 text-sm">
                                    해당 날짜에 운행하는 열차 일정이 없습니다.
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
